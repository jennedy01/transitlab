name: Deploy frontend to GitHub Pages

# Builds the client SPA and publishes it to GitHub Pages.
#
# Setup (once): repo Settings → Pages → Source = "GitHub Actions".
# Point the site at a backend by adding a repo Variable (Settings → Secrets and
# variables → Actions → Variables):  API_BASE = https://your-api-host
# Without it the page loads but its data/analysis calls have nowhere to go.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build client
        env:
          # Served from https://<user>.github.io/transitlab/
          VITE_BASE: /transitlab/
          VITE_API_BASE: ${{ vars.API_BASE }}
          VITE_MAPTILER_KEY: ${{ vars.MAPTILER_KEY }}
        run: npm run build -w @transitlab/client
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
